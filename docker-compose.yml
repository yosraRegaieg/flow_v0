version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: projectflow-db
    environment:
      POSTGRES_USER: projectflow
      POSTGRES_PASSWORD: projectflow123
      POSTGRES_DB: projectflow
    ports:
      - "5432:5432"
    volumes:
      - projectflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  projectflow_db_data:
